services:
  app:
    build: .
    container_name: travelnice-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - travelnice-net
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: travelnice-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - travelnice-net
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: travelnice-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: travelnice
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: travelnice
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - travelnice-net

  redis:
    image: redis:alpine
    container_name: travelnice-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - travelnice-net

networks:
  travelnice-net:
    driver: bridge

volumes:
  db-data: